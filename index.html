<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Road Sign - Pro Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #app { width: 100vw; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #info-box { position: absolute; bottom: 20px; left: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 15px; border-left: 5px solid #2ecc71; display: none; z-index: 100; }
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; background: #3498db; color: white; border: none; border-radius: 50px; font-weight: bold; z-index: 200; }
    </style>
</head>
<body>

<button id="startBtn">IMTIHONNI BOSHLASH</button>

<div id="app">
    <div id="info-box">
        <b id="sign-name" style="color: #2ecc71; font-size: 18px;"></b><br>
        <span id="sign-desc" style="font-size: 14px;"></span>
    </div>
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    const video = document.getElementById('webcam');
    const infoBox = document.getElementById('info-box');
    const signName = document.getElementById('sign-name');
    const signDesc = document.getElementById('sign-desc');
    let belgilarData = [];

    // 1. JSON FAYLDAN MA'LUMOTLARNI YUKLASH
    async function loadSignDatabase() {
        try {
            // Siz yuborgan data.json faylini shu yerda chaqiramiz
            const response = await fetch('data.json');
            belgilarData = await response.json();
            console.log("Baza yuklandi: " + belgilarData.length + " ta belgi bor.");
        } catch (e) {
            console.error("JSON yuklashda xato:", e);
        }
    }

    // 2. OVOZ CHIQARISH
    function speak(text) {
        if (window.speechSynthesis.speaking) return;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'uz-UZ';
        window.speechSynthesis.speak(msg);
    }

    // 3. AI DETEKSIYA VA BAZADAN QIDIRISH
    async function startAI() {
        const model = await cocoSsd.load();

        setInterval(async () => {
            const predictions = await model.detect(video);
            if (predictions.length > 0) {
                const found = predictions[0];

                // COCO-SSD hozircha faqat 'stop sign'ni taniydi.
                // Biz uni sizning JSONingizdagi "To'xtash" belgisi bilan bog'laymiz.
                if (found.class === "stop sign") {
                    // JSON ichidan 2.5 yoki "stop" so'zi bor belgi qidiramiz
                    const belgi = belgilarData.find(b => b.nomi.toLowerCase().includes("to'xtash") || b.raqam_belgisi === "2.5");

                    if (belgi) {
                        infoBox.style.display = "block";
                        signName.innerText = belgi.nomi;
                        signDesc.innerText = belgi.izoh || "Bu belgi harakatni tartibga soladi.";
                        speak(belgi.nomi + ". " + signDesc.innerText);
                    }
                }
            }
        }, 800);
    }

    // KAMERANI YOQISH uchun
    async function init() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        await loadSignDatabase();
        startAI();
    }

    document.getElementById('startBtn').addEventListener('click', function() {
        this.style.display = 'none';
        init();
    });
</script>
</body>
</html>
