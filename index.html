<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Bot Camera</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; margin: 0; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        #overlay { position: absolute; top: 20px; width: 100%; z-index: 10; }
        #startBtn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 18px; background: #248bcf; color: white;
            border: none; border-radius: 50px; cursor: pointer; z-index: 20;
        }
    </style>
</head>
<body>

<button id="startBtn">IMTIHONNI BOSHLASH</button>

<div id="overlay">
    <div id="status">AI yuklanmoqda...</div>
</div>

<video id="webcam" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // Oynani to'liq ekranga ochish

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('status');

    const belgilarBazasi = {
        "stop sign": "Stop belgisi aniqlandi. To'liq to'xtash shart!"
    };

    async function init() {
        try {
            // Telegramdan kameraga ruxsat so'rash (WebApp uchun)
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" }
            });
            video.srcObject = stream;

            statusText.innerText = "Model yuklanmoqda...";
            const model = await cocoSsd.load();
            statusText.innerText = "AI Tayyor! Belgini ko'rsating.";

            detect(model);
        } catch (err) {
            alert("Kamera xatosi: " + err.message);
        }
    }

    function detect(model) {
        const ctx = canvas.getContext('2d');
        setInterval(async () => {
            const predictions = await model.detect(video);
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            predictions.forEach(p => {
                if (p.class === "stop sign" && p.score > 0.5) {
                    ctx.strokeStyle = "#00FF00";
                    ctx.lineWidth = 5;
                    ctx.strokeRect(...p.bbox);

                    // Ovoz chiqarish
                    speak(belgilarBazasi[p.class]);
                }
            });
        }, 500);
    }

    function speak(text) {
        if (window.speechSynthesis.speaking) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'uz-UZ';
        window.speechSynthesis.speak(utterance);
    }

    startBtn.addEventListener('click', () => {
        startBtn.style.display = 'none';
        init();
    });
</script>
</body>
</html>
