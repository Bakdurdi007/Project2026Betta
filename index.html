<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Avtodrom Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
        #container { position: relative; width: 100vw; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        #info-panel { position: absolute; top: 10px; width: 100%; z-index: 10; pointer-events: none; }
        #status { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; font-size: 14px; color: #0f0; }
        #startBtn { position: absolute; z-index: 100; padding: 15px 40px; font-size: 18px; border-radius: 30px; border: none; background: #248bcf; color: white; font-weight: bold; }
        #debug { position: absolute; bottom: 10px; left: 10px; font-size: 10px; color: red; z-index: 10; }
    </style>
</head>
<body>

<button id="startBtn">IMTIHONNI BOSHLASH</button>

<div id="info-panel">
    <span id="status">Kutmoqdaman...</span>
</div>

<div id="container">
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<div id="debug"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');
    const ctx = canvas.getContext('2d');

    const belgilar = { "stop sign": "Stop belgisi! To'xtang." };

    function log(msg) { debug.innerText += msg + "\n"; }

    async function startCamera() {
        log("Kamera so'ralmoqda...");
        try {
            // environment - orqa kamera. Agar xato bersa, oddiy kameraga o'tadi.
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: false
            });
            video.srcObject = stream;

            // Videoni majburiy o'ynatish
            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    log("Video oqimi ulandi.");
                    video.play();
                    resolve();
                };
            });
        } catch (err) {
            log("Kamera xatosi: " + err.name);
            // Fallback: har qanday kamera
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.play();
        }
    }

    async function runAI() {
        status.innerText = "Model yuklanmoqda...";
        log("AI model yuklanmoqda...");
        const model = await cocoSsd.load();
        log("AI tayyor.");
        status.innerText = "AI Tayyor. Yo'lni ko'rsating.";

        setInterval(async () => {
            if (video.readyState === 4) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                const predictions = await model.detect(video);
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                predictions.forEach(p => {
                    if (p.class === "stop sign" && p.score > 0.5) {
                        ctx.strokeStyle = "#ff0000";
                        ctx.lineWidth = 10;
                        ctx.strokeRect(...p.bbox);

                        // Ovoz chiqarish
                        speak(belgilar[p.class]);
                    }
                });
            }
        }, 500);
    }

    function speak(text) {
        if (window.speechSynthesis.speaking) return;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'uz-UZ';
        window.speechSynthesis.speak(msg);
    }

    startBtn.addEventListener('click', async () => {
        log("Boshlash tugmasi bosildi.");
        startBtn.style.display = 'none';
        // Ovozni 'uyg'otish'
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

        await startCamera();
        runAI();
    });
</script>
</body>
</html>
