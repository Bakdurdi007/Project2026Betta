<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Road Sign - Telegram Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #video-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #1a1a1a; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #ui { position: absolute; top: 20px; z-index: 100; text-align: center; width: 100%; }
        #status { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; font-weight: bold; color: #00ff00; display: none; }
        #startBtn { padding: 15px 40px; font-size: 20px; background: #3498db; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4); }
    </style>
</head>
<body>

<button id="startBtn">IMTIHONNI BOSHLASH</button>

<div id="ui">
    <div id="status">AI yuklanmoqda...</div>
</div>

<div id="video-container">
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // Telegram oynasini to'liq ochish

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const ctx = canvas.getContext('2d');

    const belgilarBazasi = {
        "stop sign": "Bu majburiy to'xtash belgisi. To'xtash chizig'ida 3 soniya to'xtab turing."
    };

    let lastSpoken = "";
    let isSpeaking = false;

    // 1. Kamerani sozlash
    async function setupCamera() {
        try {
            const constraints = {
                video: { facingMode: { exact: "environment" } }, // Faqat orqa kamera
                audio: false
            };

            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;

            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve(video);
                };
            });
        } catch (err) {
            console.error("Orqa kamera topilmadi, umumiy kameraga o'tilmoqda...");
            // Agar 'exact environment' ishlamasa (noutbuklarda), oddiy video oqimi
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.play();
        }
    }

    // 2. Ovozli xabar
    function speak(text) {
        if (isSpeaking || lastSpoken === text) return;

        isSpeaking = true;
        lastSpoken = text;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'uz-UZ';

        msg.onend = () => {
            setTimeout(() => {
                isSpeaking = false;
                lastSpoken = ""; // Qayta gapirishi uchun tozalamiz
            }, 5000);
        };
        window.speechSynthesis.speak(msg);
    }

    // 3. AI aniqlash jarayoni
    async function runDetection(model) {
        status.style.display = "inline-block";
        status.innerText = "AI tayyor! Belgini ko'rsating.";

        setInterval(async () => {
            // Canvas o'lchamini video o'lchamiga moslash
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const predictions = await model.detect(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            predictions.forEach(prediction => {
                if (prediction.class === "stop sign" && prediction.score > 0.6) {
                    // Vizual belgilash
                    ctx.strokeStyle = "#00FF00";
                    ctx.lineWidth = 6;
                    ctx.strokeRect(...prediction.bbox);

                    ctx.fillStyle = "#00FF00";
                    ctx.font = "bold 30px Arial";
                    ctx.fillText("STOP", prediction.bbox[0], prediction.bbox[1] - 10);

                    // Gapirish
                    speak(belgilarBazasi["stop sign"]);
                }
            });
        }, 500);
    }

    // Tugma bosilganda ishga tushirish
    startBtn.addEventListener('click', async () => {
        startBtn.style.display = 'none';

        // Ovoz tizimini faollashtirish (iOS/Chrome uchun shart)
        const silent = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(silent);

        try {
            await setupCamera();
            const model = await cocoSsd.load();
            runDetection(model);
        } catch (e) {
            alert("Xato yuz berdi: " + e.message);
        }
    });
</script>
</body>
</html>
