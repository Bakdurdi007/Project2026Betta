<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Aqlli Yo'l Belgilari (JS)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; }
        video, canvas { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); border: 3px solid #333; border-radius: 10px; }
        #status { font-size: 24px; font-weight: bold; margin-top: 20px; color: #d35400; }
    </style>
</head>
<body>

<h1>Yo'l belgilarini tanuvchi AI</h1>
<div id="status">Kamera va AI yuklanmoqda... Iltimos kuting.</div>

<video id="webcam" autoplay muted width="640" height="480"></video>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status');

    // Bizning belgilar bazamiz
    const belgilarBazasi = {
        "stop sign": "Bu majburiy to'xtash belgisi. Chiziq oldida to'liq to'xtashingiz shart."
    };

    let isSpeaking = false; // Dastur tinimsiz gapiravermasligi uchun blokirovka

    // 1. Ovozli xabar berish funksiyasi
    function gapirish(matn) {
        if (isSpeaking) return; // Agar gapirayotgan bo'lsa, kutadi

        isSpeaking = true;
        const nutq = new SpeechSynthesisUtterance(matn);
        nutq.lang = 'uz-UZ'; // O'zbek tilida gapirishga harakat qiladi (yoki rus/ingliz)
        nutq.rate = 0.9; // Gapirish tezligi

        nutq.onend = () => {
            // Gapirib bo'lgach, 5 soniyadan keyin yana gapirishga ruxsat beramiz
            setTimeout(() => { isSpeaking = false; }, 5000);
        };

        window.speechSynthesis.speak(nutq);
    }

    // 2. Kamerani ishga tushirish
    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        return new Promise((resolve) => {
            video.onloadedmetadata = () => resolve(video);
        });
    }

    // 3. AIni yuklash va belgilarni qidirish
    async function runAI() {
        const model = await cocoSsd.load();
        statusText.innerText = "AI tayyor! Kameraga STOP belgisini ko'rsating.";

        setInterval(async () => {
            // Rasmda nima borligini aniqlaymiz
            const predictions = await model.detect(video);

            // Ekranni tozalab, yangidan chizamiz
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            predictions.forEach(prediction => {
                const objName = prediction.class; // Obyekt nomi
                const score = Math.round(prediction.score * 100); // Ishonch foizi

                // Agar "stop sign" topsa
                if (objName === "stop sign" && score > 60) {
                    // To'rtburchak chizamiz
                    ctx.beginPath();
                    ctx.rect(...prediction.bbox);
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = "red";
                    ctx.fillStyle = "red";
                    ctx.stroke();
                    ctx.fillText(`${objName} (${score}%)`, prediction.bbox[0], prediction.bbox[1] > 10 ? prediction.bbox[1] - 5 : 10);

                    statusText.innerText = "Belgi topildi: STOP";
                    statusText.style.color = "green";

                    // Bazadan ma'lumotni olib, ovoz chiqarib o'qiymiz
                    if (belgilarBazasi[objName]) {
                        gapirish(belgilarBazasi[objName]);
                    }
                }
            });
        }, 500); // Har yarim soniyada tekshiradi
    }

    // Dasturni boshlash
    setupCamera().then(runAI).catch(err => {
        statusText.innerText = "Kameraga ruxsat berilmadi yoki xato yuz berdi.";
        console.error(err);
    });
</script>
</body>
</html>
