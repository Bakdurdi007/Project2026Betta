<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Avtodrom Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; background: #111; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; left:0; top:0; }
        canvas { position: absolute; width: 100%; height: 100%; z-index: 2; left:0; top:0; pointer-events: none; }
        #ui { position: absolute; top: 10px; width: 100%; z-index: 10; pointer-events: none; }
        #status { background: rgba(0,255,0,0.3); padding: 5px 15px; border-radius: 20px; font-size: 16px; color: #0f0; border: 1px solid #0f0; }
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; padding: 20px 40px; font-size: 20px; border-radius: 50px; border: none; background: #248bcf; color: white; font-weight: bold; cursor: pointer; }
        #debug { position: absolute; bottom: 20px; left: 10px; right: 10px; font-size: 12px; color: #ff4444; z-index: 100; text-align: left; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<button id="startBtn">IMTIHONNI BOSHLASH</button>

<div id="ui">
    <span id="status">Kamera kutilmoqda...</span>
</div>

<div id="container">
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<div id="debug">Diagnostika: Tayyor.</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');
    const ctx = canvas.getContext('2d');

    const belgilar = { "stop sign": "Stop belgisi! To'xtashingiz shart." };

    function log(msg) {
        debug.innerText += "\n> " + msg;
        console.log(msg);
    }

    async function startCamera() {
        log("Kameraga so'rov yuborilmoqda...");

        // Orqa kamerani ochish uchun eng xavfsiz sozlamalar
        const constraints = {
            video: {
                facingMode: "environment", // 'exact' olib tashlandi - xavfsizroq
                width: { ideal: 640 },
                height: { ideal: 480 }
            },
            audio: false
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            log("Kamera oqimi olindi.");

            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    log("Video o'ynashni boshladi.");
                    video.play();
                    resolve();
                };
            });
        } catch (err) {
            log("XATO: " + err.name + " - " + err.message);

            // Agar orqa kamera ochilmasa, ixtiyoriy kamerani ochishga urinish
            log("Ixtiyoriy kameraga urinib ko'ramiz...");
            const simpleStream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = simpleStream;
            video.play();
        }
    }

    async function runAI() {
        status.innerText = "Sun'iy intellekt yuklanmoqda...";
        log("AI model yuklanmoqda...");
        try {
            const model = await cocoSsd.load();
            log("AI model yuklandi.");
            status.innerText = "AI TAYYOR ✅";
            status.style.background = "rgba(0,255,0,0.6)";

            setInterval(async () => {
                if (video.readyState === 4) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;

                    const predictions = await model.detect(video);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    predictions.forEach(p => {
                        if (p.class === "stop sign" && p.score > 0.5) {
                            ctx.strokeStyle = "#ff0000";
                            ctx.lineWidth = 10;
                            ctx.strokeRect(...p.bbox);
                            speak(belgilar[p.class]);
                        }
                    });
                }
            }, 500);
        } catch (e) {
            log("AI XATOSI: " + e.message);
        }
    }

    function speak(text) {
        if (window.speechSynthesis.speaking) return;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'uz-UZ';
        window.speechSynthesis.speak(msg);
    }

    startBtn.addEventListener('click', async () => {
        startBtn.style.display = 'none';
        log("Boshlash tugmasi bosildi.");

        // Ovozni 'uyg'otish'
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

        try {
            await startCamera();
            await runAI();
        } catch (err) {
            log("Global xatolik: " + err.message);
        }
    });
</script>
</body>
</html>
